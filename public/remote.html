<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control Remoto — JP Estudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;
  --gold2:#a07a2a;
  --guinda:#6B1020;
  --guinda2:#4a0b16;
  --bg:#f5f0e8;
  --bg2:#fff;
  --bg3:#faf6ee;
  --text:#1a0808;
  --text2:#5a3a3a;
  --border:#e0d0b0;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Arial',sans-serif;overflow-x:hidden;}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--guinda2),var(--guinda));
  border-bottom:3px solid var(--gold);
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(107,16,32,0.3);
}
.header-logo{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:3px;}
.header-sub{font-size:10px;color:rgba(201,168,76,0.7);margin-top:3px;letter-spacing:1px;}
.header-right{text-align:right;}
.header-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;}
.header-org{font-size:9px;color:rgba(201,168,76,0.5);margin-top:2px;}

/* STATUS */
.status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:var(--bg2);
  border-bottom:2px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}
.status-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:1px;
  transition:all 0.3s;
}
.status-pill.connecting{background:#fff3cd;color:#856404;border:1px solid #ffc107;}
.status-pill.connected{background:#d1e7dd;color:#0a3622;border:1px solid #4caf50;}
.status-pill.error{background:#f8d7da;color:#58151c;border:1px solid #dc3545;}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
.dot.pulse{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.screen-badge{font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:12px;border:1px solid var(--border);}

/* CONTENT */
.content{padding:14px;display:flex;flex-direction:column;gap:12px;max-width:420px;margin:0 auto;}

/* SECTION */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.sec-label{
  font-size:9px;letter-spacing:3px;color:var(--gold2);font-weight:900;
  text-transform:uppercase;border-bottom:2px solid var(--border);
  padding-bottom:8px;margin-bottom:12px;
}

/* PLAY BUTTON */
.play-btn{
  width:100%;padding:22px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--guinda),var(--guinda2));
  color:var(--gold);font-size:28px;font-weight:900;
  cursor:pointer;transition:all 0.12s;
  display:flex;align-items:center;justify-content:center;gap:14px;
  letter-spacing:3px;box-shadow:0 4px 16px rgba(107,16,32,0.35);
  border:2px solid rgba(201,168,76,0.4);
}
.play-btn:active{transform:scale(0.96);box-shadow:0 1px 4px rgba(107,16,32,0.2);}
.play-btn.playing{
  background:linear-gradient(135deg,#1a5c1a,#0d3d0d);
  color:#81c784;border-color:rgba(129,199,132,0.4);
  box-shadow:0 4px 16px rgba(26,92,26,0.35);
}

/* 2-COL GRID */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.act-btn{
  padding:16px 8px;border:none;border-radius:12px;
  font-size:24px;cursor:pointer;transition:all 0.12s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  font-weight:700;
}
.act-btn span{font-size:9px;letter-spacing:2px;font-weight:800;}
.act-btn:active{transform:scale(0.93);}
.btn-stop{background:linear-gradient(135deg,var(--guinda),var(--guinda2));color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.btn-restart{background:var(--bg3);color:var(--guinda);border:2px solid var(--guinda);}

/* VELOCIDAD */
.spd-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.spd-btn{
  width:56px;height:56px;border-radius:50%;border:2px solid var(--guinda);
  background:var(--bg3);color:var(--guinda);font-size:26px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;flex-shrink:0;
}
.spd-btn:active{background:var(--guinda);color:var(--gold);}
.spd-num{
  font-size:52px;font-weight:900;color:var(--guinda);
  text-align:center;flex:1;line-height:1;
}
.spd-lbl{font-size:9px;color:var(--text2);text-align:center;letter-spacing:2px;margin-top:2px;}
.spd-bar{height:5px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden;}
.spd-fill{height:100%;background:linear-gradient(90deg,var(--guinda),var(--gold));border-radius:3px;transition:width 0.25s;}

/* SCROLL */
.scroll-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.scr-btn{
  padding:20px 8px;border:1px solid var(--border);border-radius:12px;
  background:var(--bg3);font-size:28px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all 0.12s;
}
.scr-btn span{font-size:9px;letter-spacing:2px;color:var(--text2);font-weight:700;}
.scr-btn:active{background:var(--guinda);border-color:var(--guinda);}
.scr-btn:active span{color:var(--gold);}

/* TEXTO ZOOM */
.zoom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.zoom-btn{
  padding:14px 8px;border:none;border-radius:12px;
  font-size:22px;font-weight:900;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.12s;
}
.zoom-btn span{font-size:10px;letter-spacing:1px;}
.zoom-btn:active{transform:scale(0.94);}
.zb-up{background:linear-gradient(135deg,var(--guinda),var(--guinda2));color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.zb-down{background:var(--bg3);color:var(--text);border:2px solid var(--border);}

/* TIEMPO */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.time-btn{
  padding:14px 8px;border:1px solid var(--border);border-radius:12px;
  background:var(--bg3);font-size:22px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all 0.12s;
}
.time-btn span{font-size:9px;letter-spacing:1px;color:var(--text2);font-weight:700;}
.time-btn:active{background:var(--guinda);border-color:var(--guinda);}
.time-btn:active span{color:var(--gold);}
.tb-crono{border-color:#4caf50;}
.tb-crono span{color:#2e7d32;}
.tb-reset{border-color:#ff9800;}
.tb-reset span{color:#e65100;}
.tb-clock{border-color:#1976d2;}
.tb-clock span{color:#1565c0;}
.tb-opts{border-color:var(--guinda);}
.tb-opts span{color:var(--guinda);}

/* FONDOS */
.fondo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.fondo-btn{
  aspect-ratio:1;border-radius:10px;cursor:pointer;
  transition:all 0.12s;border:2px solid transparent;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
}
.fondo-btn:active{transform:scale(0.88);}
.fondo-btn.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.4);}
.fondo-btn.light{border-color:var(--border);}

/* FOOTER */
.footer{padding:20px;text-align:center;color:var(--border);font-size:10px;letter-spacing:2px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">JP ESTUDIO</div>
    <div class="header-sub" id="sessionLabel">Control Remoto</div>
  </div>
  <div class="header-right">
    <div class="header-title">TELEPROMPTER</div>
    <div class="header-org">SITT • TIJUANA</div>
  </div>
</div>

<div class="status-bar">
  <div class="status-pill connecting" id="statusPill">
    <div class="dot pulse" id="statusDot"></div>
    <span id="statusText">Conectando...</span>
  </div>
  <div class="screen-badge" id="screenStatus">📺 Esperando...</div>
</div>

<div class="content">

  <!-- PLAY -->
  <div class="sec">
    <div class="sec-label">▶ Reproducción</div>
    <button class="play-btn" id="playBtn" onclick="send('toggle')">
      <span id="playIcon">▶</span>
      <span id="playLabel">PLAY</span>
    </button>
    <div class="btn-grid">
      <button class="act-btn btn-stop" onclick="send('stop')">⏹<span>STOP</span></button>
      <button class="act-btn btn-restart" onclick="send('restart')">↺<span>REINICIAR</span></button>
    </div>
  </div>

  <!-- VELOCIDAD -->
  <div class="sec">
    <div class="sec-label">⚡ Velocidad</div>
    <div class="spd-row">
      <button class="spd-btn" onclick="changeSpeed(-1)">−</button>
      <div>
        <div class="spd-num" id="speedDisplay">3</div>
        <div class="spd-lbl">VELOCIDAD</div>
      </div>
      <button class="spd-btn" onclick="changeSpeed(+1)">+</button>
    </div>
    <div class="spd-bar"><div class="spd-fill" id="speedFill" style="width:30%"></div></div>
  </div>

  <!-- SCROLL -->
  <div class="sec">
    <div class="sec-label">↕ Desplazamiento</div>
    <div class="scroll-grid">
      <button class="scr-btn" onclick="send('up')">⬆️<span>SUBIR</span></button>
      <button class="scr-btn" onclick="send('down')">⬇️<span>BAJAR</span></button>
    </div>
  </div>

  <!-- TEXTO -->
  <div class="sec">
    <div class="sec-label">🔤 Tamaño de Texto</div>
    <div class="zoom-grid">
      <button class="zoom-btn zb-up" onclick="send('zoom_in')">A＋<span>MÁS GRANDE</span></button>
      <button class="zoom-btn zb-down" onclick="send('zoom_out')">A－<span>MÁS CHICO</span></button>
    </div>
  </div>

  <!-- TIEMPO -->
  <div class="sec">
    <div class="sec-label">⏱ Tiempo y Herramientas</div>
    <div class="time-grid">
      <button class="time-btn tb-crono" onclick="send('crono_toggle')">⏱<span>CRONÓMETRO</span></button>
      <button class="time-btn tb-reset" onclick="send('crono_reset')">🔄<span>RESET CRONO</span></button>
      <button class="time-btn tb-clock" onclick="send('reloj_toggle')">🕐<span>RELOJ</span></button>
      <button class="time-btn tb-opts" onclick="send('panel_toggle')">⚙️<span>OPCIONES</span></button>
    </div>
  </div>

  <!-- FONDOS -->
  <div class="sec">
    <div class="sec-label">🎨 Color de Fondo</div>
    <div class="fondo-grid" id="fondoGrid"></div>
  </div>

</div>
<div class="footer">JP ESTUDIO • SITT TIJUANA</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('s') || 'default';
const WS_URL = 'wss://jpestudio-api.onrender.com/ws';

document.getElementById('sessionLabel').textContent = 'Sesión: ' + sessionId;

let ws = null, playing = false, speed = 3;
let reconnectTimer = null, reconnectCount = 0;

// Fondos
const fondos = [
  {col:'#6B1020',label:'Guinda'},
  {col:'#000000',label:'Negro'},
  {col:'#1a1a1a',label:'Gris'},
  {col:'#1A4A6B',label:'Azul'},
  {col:'#1B4D3E',label:'Verde'},
  {col:'#500e18',label:'Vino'},
  {col:'#2a0a3a',label:'Morado'},
  {col:'#3a2500',label:'Café'},
  {col:'#0d0d2a',label:'Navy'},
  {col:'#ffffff',label:'Blanco',light:true}
];

const grid = document.getElementById('fondoGrid');
fondos.forEach(function(f, i){
  const b = document.createElement('button');
  b.className = 'fondo-btn' + (f.light?' light':'');
  b.id = 'fb'+i;
  b.style.background = f.col;
  b.title = f.label;
  b.onclick = function(){ send('bg:'+f.col); setActiveFondo(i); };
  grid.appendChild(b);
});

function setActiveFondo(idx){
  document.querySelectorAll('.fondo-btn').forEach(b=>b.classList.remove('active'));
  const b = document.getElementById('fb'+idx);
  if(b) b.classList.add('active');
}

function connect(){
  try { if(ws) ws.close(); } catch(e){}
  ws = new WebSocket(WS_URL+'?session='+sessionId+'&role=remote');

  ws.onopen = function(){
    reconnectCount = 0;
    setStatus('connected','🟢 Conectado');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = function(e){
    try {
      const msg = JSON.parse(e.data);
      if(msg.type === 'state'){
        playing = !!msg.playing;
        if(msg.speed) speed = msg.speed;
        updateUI();
      }
      if(msg.type === 'connected' || msg.type === 'remote_connected'){
        document.getElementById('screenStatus').textContent = '📺 Pantalla ✓';
      }
      if(msg.type === 'screen_disconnected'){
        document.getElementById('screenStatus').textContent = '📺 Sin pantalla';
      }
    } catch(err){}
  };

  ws.onclose = function(){
    reconnectCount++;
    const msg = reconnectCount > 3 ? '⚠️ Servidor dormido (~30s)' : '⏳ Reconectando...';
    setStatus('connecting', msg);
    reconnectTimer = setTimeout(connect, reconnectCount > 3 ? 8000 : 3000);
  };

  ws.onerror = function(){ setStatus('error','🔴 Error'); };
}

function setStatus(type, text){
  const pill = document.getElementById('statusPill');
  const dot  = document.getElementById('statusDot');
  pill.className = 'status-pill ' + type;
  dot.className  = 'dot' + (type==='connecting'?' pulse':'');
  document.getElementById('statusText').textContent = text;
}

function send(action){
  if(!ws || ws.readyState !== 1){
    setStatus('error','Sin conexión');
    setTimeout(function(){ connect(); }, 500);
    return;
  }
  ws.send(JSON.stringify({action: action, speed: speed}));
  if(action === 'toggle'){ playing = !playing; updateUI(); }
  if(navigator.vibrate) navigator.vibrate(25);
}

function changeSpeed(delta){
  speed = Math.max(1, Math.min(10, speed + delta));
  document.getElementById('speedDisplay').textContent = speed;
  document.getElementById('speedFill').style.width = (speed*10)+'%';
  send('speed:'+speed);
}

function updateUI(){
  const btn   = document.getElementById('playBtn');
  const icon  = document.getElementById('playIcon');
  const label = document.getElementById('playLabel');
  if(playing){
    btn.className = 'play-btn playing';
    icon.textContent  = '⏸';
    label.textContent = 'PAUSA';
  } else {
    btn.className = 'play-btn';
    icon.textContent  = '▶';
    label.textContent = 'PLAY';
  }
  document.getElementById('speedDisplay').textContent = speed;
  document.getElementById('speedFill').style.width = (speed*10)+'%';
}

connect();
</script>
</body>
</html>
