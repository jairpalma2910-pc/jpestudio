<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  var base = '/jpestudio';
  var rest = path.replace(base, '');
  sessionStorage.setItem('redirect', rest + search + hash);
  window.location.replace(base + '/');
</script>
</head>
<body></body>
</html>
