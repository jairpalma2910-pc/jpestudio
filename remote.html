<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control Remoto - JP Estudio</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0a0005; color:#fff; font-family:Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }

.header { text-align:center; margin-bottom:24px; padding-top:10px; }
.logo { font-size:24px; font-weight:900; color:#C9A84C; letter-spacing:2px; }
.session-id { font-size:11px; color:#555; margin-top:4px; }

.status { 
  padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600;
  margin-bottom:24px; letter-spacing:1px;
}
.status.connecting { background:rgba(255,165,0,0.2); color:#ffa500; border:1px solid #ffa500; }
.status.connected   { background:rgba(76,175,80,0.2); color:#81c784; border:1px solid #81c784; }
.status.error       { background:rgba(138,21,21,0.3); color:#ef9a9a; border:1px solid #ef9a9a; }

/* Botones principales */
.main-controls { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:340px; margin-bottom:24px; }

.ctrl-btn {
  padding:28px 10px;
  border:none; border-radius:16px;
  font-size:28px; font-weight:bold;
  cursor:pointer; transition:all 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  -webkit-user-select:none; user-select:none;
}
.ctrl-btn span { font-size:12px; font-weight:600; letter-spacing:1px; }
.ctrl-btn:active { transform:scale(0.94); }

.btn-play  { background:#C9A84C; color:#000; grid-column:1/-1; padding:32px; }
.btn-up    { background:#1a1a3e; color:#C9A84C; border:2px solid #C9A84C; }
.btn-down  { background:#1a1a3e; color:#C9A84C; border:2px solid #C9A84C; }
.btn-stop  { background:#8a1515; color:#fff; grid-column:1/-1; padding:20px; }

/* Velocidad */
.speed-section { width:100%; max-width:340px; margin-bottom:24px; }
.speed-label { font-size:12px; color:#888; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; text-align:center; }
.speed-controls { display:flex; align-items:center; gap:12px; justify-content:center; }
.speed-btn {
  width:52px; height:52px; border-radius:50%;
  border:2px solid #C9A84C; background:transparent;
  color:#C9A84C; font-size:22px; font-weight:bold;
  cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center;
}
.speed-btn:active { background:#C9A84C; color:#000; transform:scale(0.92); }
.speed-display {
  font-size:36px; font-weight:900; color:#C9A84C;
  min-width:60px; text-align:center;
}
.speed-bar {
  width:100%; height:6px; background:#1a1a1a; border-radius:3px; margin-top:10px; overflow:hidden;
}
.speed-fill { height:100%; background:#C9A84C; border-radius:3px; transition:width 0.2s; }

/* Estado pantalla */
.screen-status { 
  font-size:12px; color:#555; text-align:center; margin-top:8px;
  padding:8px; border:1px solid #1a1a1a; border-radius:8px; width:100%; max-width:340px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">JP ESTUDIO</div>
  <div class="session-id" id="sessionLabel">Control Remoto</div>
</div>

<div class="status connecting" id="status">⏳ Conectando...</div>

<div class="main-controls">
  <button class="ctrl-btn btn-play" onclick="send('toggle')">
    <span id="playIcon">▶</span>
    <span id="playLabel">PLAY</span>
  </button>
  <button class="ctrl-btn btn-up" onclick="send('up')">
    ⬆️
    <span>SUBIR</span>
  </button>
  <button class="ctrl-btn btn-down" onclick="send('down')">
    ⬇️
    <span>BAJAR</span>
  </button>
  <button class="ctrl-btn btn-stop" onclick="send('stop')">
    ⏹ <span>DETENER Y REINICIAR</span>
  </button>
</div>

<div class="speed-section">
  <div class="speed-label">Velocidad</div>
  <div class="speed-controls">
    <button class="speed-btn" onclick="changeSpeed(-1)">−</button>
    <div class="speed-display" id="speedDisplay">3</div>
    <button class="speed-btn" onclick="changeSpeed(1)">+</button>
  </div>
  <div class="speed-bar">
    <div class="speed-fill" id="speedFill" style="width:30%"></div>
  </div>
</div>

<div class="screen-status" id="screenStatus">📺 Esperando pantalla...</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('s') || 'default';
const WS_URL = 'wss://jpestudio-api.onrender.com/ws';

document.getElementById('sessionLabel').textContent = 'Sesión: ' + sessionId;

let ws = null;
let playing = false;
let speed = 3;
let reconnectTimer = null;

function connect() {
  ws = new WebSocket(`${WS_URL}?session=${sessionId}&role=remote`);

  ws.onopen = () => {
    setStatus('connected', '🟢 Conectado');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        playing = msg.playing;
        speed = msg.speed;
        updateUI();
      } else if (msg.type === 'screen_disconnected') {
        document.getElementById('screenStatus').textContent = '📺 Pantalla desconectada';
      } else if (msg.type === 'screen_connected' || msg.type === 'remote_connected') {
        document.getElementById('screenStatus').textContent = '📺 Pantalla conectada ✓';
      }
    } catch(e) {}
  };

  ws.onclose = () => {
    setStatus('error', '🔴 Desconectado');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('error', '❌ Error de conexión');
  };
}

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = text;
}

function send(action) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ action, speed }));
  // Feedback local inmediato
  if (action === 'toggle') {
    playing = !playing;
    updateUI();
  }
}

function changeSpeed(delta) {
  speed = Math.max(1, Math.min(10, speed + delta));
  document.getElementById('speedDisplay').textContent = speed;
  document.getElementById('speedFill').style.width = (speed * 10) + '%';
  if (ws?.readyState === 1) ws.send(JSON.stringify({ action: 'speed', speed }));
}

function updateUI() {
  document.getElementById('playIcon').textContent = playing ? '⏸' : '▶';
  document.getElementById('playLabel').textContent = playing ? 'PAUSA' : 'PLAY';
  document.getElementById('speedDisplay').textContent = speed;
  document.getElementById('speedFill').style.width = (speed * 10) + '%';
}

connect();
</script>
</body>
</html>
